targets:
  main:
    resources:
      RemotePlace:
        name: bf-muse-pi-pro
    drivers:
      - SerialDriver:
          name: 'muse-pi-pro-console-1'
          bindings:
            port: 'muse-pi-pro-serial-port-1'
      - GpioDigitalOutputDriver:
          name: 'muse-pi-pro-power-gpio-1'
          bindings:
            gpio: 'muse-pi-pro-power-gpio-1'
      - DigitalOutputPowerDriver:
          name: 'muse-pi-pro-power-1'
          bindings:
            output: 'muse-pi-pro-power-gpio-1'
      - TFTPProviderDriver:
          name: 'muse-pi-pro-tftp-1'
          bindings:
            provider: 'muse-pi-pro-tftp-1'
      - UBootDriver:
          prompt: '=> '
          autoboot: 'Autoboot in 5 seconds'
          interrupt: 's'
          name: 'muse-pi-pro-uboot-1'
          boot_commands:
            emmc: 'boot'
            tftp: 'booti $kernel_addr_r - $dtb_addr'
          bindings:
            console: 'muse-pi-pro-console-1'
          login_timeout: 30
          boot_timeout: 30
          strip_timestamp: True
      - ShellDriver:
          prompt: '(\x1b\[\?2004h)?root@[\w-]+:[^ ]+[#$] '
          login_prompt: '[-\w]+ login: '
          username: 'root'
          name: 'muse-pi-pro-shell-1'
          bindings:
            console: 'muse-pi-pro-console-1'
      - MusePiProBootStrategy:
          name: 'muse-pi-pro-strategy-1'
          bindings:
            power: 'muse-pi-pro-power-1'
            console: 'muse-pi-pro-console-1'
            uboot: 'muse-pi-pro-uboot-1'
            shell: 'muse-pi-pro-shell-1'
            tftp: 'muse-pi-pro-tftp-1'

imports:
  - muse_pi_pro_boot_strategy.py
