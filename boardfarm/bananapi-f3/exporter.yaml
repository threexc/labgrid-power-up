bf-bananapi-f3:
  location: ecoforge
  bananapi-f3-serial-port-1:
    cls: 'USBSerialPort'
    match:
      '@ID_SERIAL_SHORT': 'E6616408434F1027'
  bananapi-f3-power-gpio-1:
    cls: 'MatchedSysfsGPIO'
    match:
      '@SUBSYSTEM': usb
      '@ID_SERIAL_SHORT': 'D30HF056'
    pin: 0
  bananapi-f3-tftp-1:
    cls: 'RemoteTFTPProvider'
    host: '192.168.40.134'
    internal: '/srv/tftp/bananapi-f3/'
    external: 'bananapi-f3/'
