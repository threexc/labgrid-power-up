targets:
  main:
    resources:
      RemotePlace:
        name: bf-bananapi-f3
    drivers:
      - SerialDriver:
          name: 'bananapi-f3-console-1'
          bindings:
            port: 'bananapi-f3-serial-port-1'
      - GpioDigitalOutputDriver:
          name: 'bananapi-f3-power-gpio-1'
          bindings:
            gpio: 'bananapi-f3-power-gpio-1'
      - DigitalOutputPowerDriver:
          name: 'bananapi-f3-power-1'
          bindings:
            output: 'bananapi-f3-power-gpio-1'
      - TFTPProviderDriver:
          name: 'bananapi-f3-tftp-1'
          bindings:
            provider: 'bananapi-f3-tftp-1'
      - UBootDriver:
          prompt: '=> '
          autoboot: 'Hit any key to stop autoboot:'
          interrupt: ' '
          name: 'bananapi-f3-uboot-1'
          boot_commands:
            emmc: 'boot'
            tftp: 'booti $kernel_addr_r - $fdt_addr_r'
          bindings:
            console: 'bananapi-f3-console-1'
          login_timeout: 30
          boot_timeout: 30
          strip_timestamp: True
      - ShellDriver:
          prompt: '(\x1b\[\?2004h)?armbian@[\w-]+:[^ ]+[#$] '
          login_prompt: '[-\w]+ login: '
          username: 'armbian'
          password: 'armbian'
          name: 'bananapi-f3-shell-1'
          bindings:
            console: 'bananapi-f3-console-1'
      - BananaPiF3BootStrategy:
          name: 'bananapi-f3-strategy-1'
          bindings:
            power: 'bananapi-f3-power-1'
            console: 'bananapi-f3-console-1'
            uboot: 'bananapi-f3-uboot-1'
            shell: 'bananapi-f3-shell-1'
            tftp: 'bananapi-f3-tftp-1'

imports:
  - strategy.py
