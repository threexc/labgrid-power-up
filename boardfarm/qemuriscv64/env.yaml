imports:
  - qemu_strategy.py

targets:
  main:
    drivers:
      QEMUDriver:
        qemu_bin: qemu-system-riscv64
        bios: ptest_image_bios
        kernel: ptest_image_kernel
        cpu: 'rva23s64'
        memory: "8192"
        machine: 'virt'
        disk: ptest_image_ext4
        boot_args: 'root=/dev/vda rw console=ttyS0 earlycon'
        extra_args: >-
          -display none
          -device virtio-net-device,netdev=net0,mac=52:54:00:12:35:02
          -netdev user,id=net0,hostfwd=tcp:127.0.0.1:2222-:22,hostfwd=tcp:127.0.0.1:2323-:23
          -object rng-random,filename=/dev/urandom,id=rng0
          -device virtio-rng-device,rng=rng0
      ShellDriver:
        prompt: 'root@[a-zA-Z0-9]+:~#\s'
        login_prompt: ' login: '
        username: 'root'
        login_timeout: 300
      QEMUYoctoStrategy: {}

images:
  ptest_image_bios: '/home/labgrid/fw_jump.elf'
  ptest_image_ext4: '/home/labgrid/ptest_image.ext4'
  ptest_image_kernel: '/home/labgrid/Image'
